<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student List</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Custom CSS -->
<link rel="stylesheet" th:href="@{/css/style1.css}">

</head>


<body>


<div class="container mt-5">

<div class="header-bg-student text-center mb-4">

<h2 class="fw-bold">
<i class="fas fa-user-graduate me-2"></i>
Student Records
</h2>

<p class="mb-0">Manage all registered students</p>

</div>


<div class="card shadow-sm p-3">

<table class="table table-hover mb-0 custom-table">

<thead class="table-dark">

<tr>

<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Course</th>
<th>Year</th>
<th>Address</th>
<th class="text-center">Action</th>

</tr>

</thead>


<tbody>

<tr th:each="s : ${students}">

<td th:text="${s.id}"></td>

<td th:text="${s.name}" class="fw-bold"></td>

<td th:text="${s.email}"></td>

<td th:text="${s.phone}"></td>

<td th:text="${s.course}"></td>

<td th:text="${s.year}"></td>

<td th:text="${s.address}"></td>

<td class="text-center">

<a th:href="@{/deleteStudent/{id}(id=${s.id})}"
class="btn btn-sm btn-outline-danger">

<i class="fas fa-trash"></i> Delete

</a>

</td>

</tr>

</tbody>

</table>

</div>


<div class="text-center mt-4">

<a th:href="@{/addStudent}" class="btn btn-success">

<i class="fas fa-user-plus"></i> Add Student

</a>

</div>


</div>


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script th:src="@{/js/script1.js}"></script>

</body>
</html>
