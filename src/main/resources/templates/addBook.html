<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title
	th:text="${book.id != null ? 'Edit Book | Library' : 'Add New Book | Library'}"></title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link
	href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
	rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
	<link rel="stylesheet" th:href="@{/css/style1.css}">
<style>
body {
	font-family: 'Poppins', sans-serif;
	background-color: #f4f7f6;
}

.card {
	border: none;
	border-radius: 15px;
}

.btn-primary {
	background-color: #4e73df;
	border: none;
	padding: 10px 20px;
	border-radius: 8px;
}

.btn-primary:hover {
	background-color: #2e59d9;
}

.form-control {
	border-radius: 8px;
	padding: 12px;
}

.form-label {
	font-weight: 600;
	color: #444;
}
</style>
</head>
<body>

	<div class="container mt-5">
		<div class="row justify-content-center">
			<div class="col-md-6">
				<div class="card shadow-lg p-4">
					<div class="text-center mb-4">
						<h2 class="text-primary fw-bold"
							th:text="${book.id != null ? '📝 Edit Book' : '📖 Add New Book'}"></h2>
						<p class="text-muted"
							th:text="${book.id != null ? 'Update the details of the existing book' : 'Enter book details below to add it to the library'}"></p>
					</div>

					<form th:action="@{/saveBook}" th:object="${book}" method="post">

						<input type="hidden" th:field="*{id}">

						<div class="mb-3">
							<label class="form-label">Book Title</label> <input type="text"
								th:field="*{title}" class="form-control"
								placeholder="e.g. Java Complete Reference" required>
						</div>

						<div class="mb-3">
							<label class="form-label">Author Name</label> <input type="text"
								th:field="*{author}" class="form-control"
								placeholder="e.g. Herbert Schildt" required>
						</div>

						<div class="mb-4">
							<label class="form-label">Quantity</label> <input type="number"
								th:field="*{quantity}" class="form-control"
								placeholder="Enter number of copies" required>
						</div>

						<div class="d-grid gap-2">
							<button type="submit" class="btn btn-primary fw-bold"
								th:text="${book.id != null ? 'Update Book' : 'Save to Database'}"></button>
							<a th:href="@{/books}" class="btn btn-light border mt-2">Cancel
								& Go Back</a>
						</div>

					</form>
				</div>
				<p class="text-center mt-4 text-muted small">&copy; 2026 Library
					Management System v1.0</p>
			</div>
		</div>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
		<script th:src="@{/js/script.js}"></script>
		  <script th:src="@{/js/script1.js}"></script>
</body>
</html>
