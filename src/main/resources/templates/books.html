<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Books | Library Admin</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/style1.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4 fade-in">
            <h2 class="text-primary fw-bold"><i class="fas fa-list-ul me-2"></i>Available Books</h2>
            <a th:href="@{/addBook}" class="btn btn-primary shadow-sm">
                <i class="fas fa-plus me-1"></i> Add New Book
            </a>
        </div>

        <div class="card shadow-sm border-0 fade-in">
            <div class="card-body p-0">
                <table class="table table-hover mb-0 custom-table">
                    <thead class="table-dark">
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Book Title</th>
                            <th>Author</th>
                            <th>Status</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="book : ${books}">
                            <td class="ps-4 fw-bold" th:text="${book.id}"></td>
                            <td th:text="${book.title}"></td>
                            <td th:text="${book.author}"></td>
                            <td><span class="badge bg-success">In Stock</span></td>
                            <td class="text-center">
                                <div class="btn-group" role="group">
                                    <a th:href="@{/editBook/{id}(id=${book.id})}" class="btn btn-sm btn-outline-primary">
                                        <i class="fas fa-edit"></i>
                                    }</a>
                                    <a th:href="@{/deleteBook/{id}(id=${book.id})}" class="btn btn-sm btn-outline-danger" 
                                       onclick="return confirm('Bhai, pakka delete karna hai?')">
                                        <i class="fas fa-trash-alt"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(books)}">
                            <td colspan="5" class="text-center py-5 text-muted">
                                <i class="fas fa-box-open fa-3x mb-3"></i>
                                <p>Abhi koi book nahi hai, ek naya "Add" karke dekho!</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="mt-4">
            <a th:href="@{/}" class="btn btn-secondary shadow-sm">
                <i class="fas fa-arrow-left me-1"></i> Back to Dashboard
            </a>
        </div>
    </div>

    <script th:src="@{/js/script.js}"></script>
      <script th:src="@{/js/script1.js}"></script>
</body>
</html>
