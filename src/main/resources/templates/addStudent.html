<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register Student</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Custom CSS -->
<link rel="stylesheet" th:href="@{/css/style1.css}">

</head>


<body>


<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow-lg p-4 student-card">

<h3 class="text-center text-success mb-4">
<i class="fas fa-user-graduate"></i> Student Registration
</h3>


<form th:action="@{/saveStudent}" th:object="${student}" method="post">

<input type="hidden" th:field="*{id}">


<div class="mb-3">
<label class="form-label">Full Name</label>
<input type="text" th:field="*{name}" class="form-control" placeholder="Enter full name" required>
</div>


<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" th:field="*{email}" class="form-control" placeholder="Enter email address" required>
</div>


<div class="mb-3">
<label class="form-label">Phone</label>
<input type="text" th:field="*{phone}" class="form-control" placeholder="Enter phone number">
</div>


<div class="mb-3">
<label class="form-label">Course</label>
<input type="text" th:field="*{course}" class="form-control" placeholder="Enter course">
</div>


<div class="mb-3">
<label class="form-label">Year</label>
<input type="text" th:field="*{year}" class="form-control" placeholder="Enter study year">
</div>


<div class="mb-3">
<label class="form-label">Address</label>
<textarea th:field="*{address}" class="form-control" rows="3" placeholder="Enter address"></textarea>
</div>


<button class="btn btn-success w-100">
<i class="fas fa-user-plus"></i> Register Student
</button>


</form>

</div>

</div>

</div>

</div>


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script th:src="@{/js/script1.js}"></script>

</body>
</html>
